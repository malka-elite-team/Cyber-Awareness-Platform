<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #ffffff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body-md text-on-surface antialiased">
<!-- TopAppBar -->
<header class="bg-white flex items-center h-16 px-5 w-full fixed top-0 z-50 border-b border-gray-100">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-green-600">arrow_back</span>
<h1 class="font-manrope text-base font-semibold text-gray-900">Welcome Back</h1>
</div>
</header>
<main class="min-h-screen pt-24 pb-12 px-margin-mobile flex flex-col max-w-md mx-auto">
<!-- Identity Section -->
<div class="mb-xl text-right">
<h2 class="font-h1 text-h1 text-on-surface mb-sm">تسجيل الدخول</h2>
<p class="font-body-md text-on-surface-variant">مرحباً بك مجدداً، يرجى إدخال تفاصيلك</p>
</div>
<!-- Illustration / Visual Anchor -->
<div class="mb-xl rounded-xl overflow-hidden aspect-video relative">
<img alt="abstract background" class="w-full h-full object-cover" data-alt="Modern minimalist workspace background with soft green and white hues, clean lines, and professional lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBeGJicJ6Kmv04srsz0Rt_kSLs0hRZHKgtCS1PqWoGNPCjGIKK_7BfLlz-6BW88VzUacE4dW-rdktwogADqifzVSBwrLOy4maMCGfZXGu1irJ3PE-lRi8a-t7IYqurJQf3e0R8HRXF4QS_GueiIo0yeckGwRousynltaFxz7TYMV1Pq5AjBVWWKiSGh6NmWXSn0lddlcQeD7tSseNG20ZW8huDj9Eq5mgjt9chIFa5cakFLkjJDrEIPm4zmDyJQuWCzheLnexKZhQ"/>
<div class="absolute inset-0 bg-gradient-to-t from-white/20 to-transparent"></div>
</div>
<!-- Login Form -->
<div class="space-y-lg flex-grow">
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block">البريد الإلكتروني</label>
<div class="relative">
<input class="w-full h-12 px-md bg-white border border-outline-variant rounded-lg focus:outline-none focus:border-primary-container transition-all placeholder:text-gray-400 text-right" dir="rtl" placeholder="البريد الإلكتروني" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant block">كلمة المرور</label>
<div class="relative">
<input class="w-full h-12 px-md bg-white border border-error rounded-lg focus:outline-none focus:border-error transition-all placeholder:text-gray-400 text-right" dir="rtl" placeholder="كلمة المرور" type="password" value="password123"/>
</div>
<!-- Error Message -->
<p class="font-caption text-caption text-error mt-1 flex items-center gap-1 justify-end">
                    الإيميل أو كلمة المرور غير الصحيحة
                    <span class="material-symbols-outlined text-[16px]">error</span>
</p>
</div>
<!-- Forgot Password Link -->
<div class="text-left">
<a class="font-label-md text-label-md text-[#16A34A] hover:underline transition-colors" href="#">
                    نسيت كلمة المرور؟
                </a>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-[#22C55E] text-white font-h2 text-h2 rounded-lg shadow-sm hover:brightness-105 active:scale-[0.98] transition-all flex items-center justify-center">
                تسجيل الدخول
            </button>
</div>
<!-- Footer Registration Link -->
<div class="mt-xl pt-lg border-t border-gray-100 text-center">
<p class="font-body-md text-on-surface-variant">
                ما عندك حساب؟ 
                <a class="font-label-md text-label-md text-[#16A34A] mr-1" href="#">أنشئ حساب</a>
</p>
</div>
</main>
<!-- Success Feedback Overlay (Visual Polish) -->
<div class="hidden fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] flex items-center justify-center">
<div class="bg-white p-lg rounded-xl shadow-xl border border-outline-variant text-center space-y-md max-w-[280px]">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mx-auto">
<span class="material-symbols-outlined text-white text-display">check</span>
</div>
<p class="font-h2 text-h2">تم تسجيل الدخول</p>
</div>
</div>
</body></html>
