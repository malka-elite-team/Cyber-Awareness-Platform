<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#006e2f",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#7cf994",
                        "inverse-surface": "#2a322a",
                        "inverse-on-surface": "#ebf3e7",
                        "on-secondary-container": "#007230",
                        "surface-variant": "#dce5d9",
                        "on-tertiary-container": "#76231b",
                        "error-container": "#ffdad6",
                        "secondary": "#006e2d",
                        "outline": "#6d7b6c",
                        "on-primary-fixed": "#002109",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#005321",
                        "on-background": "#161d16",
                        "on-secondary-fixed": "#002109",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb4a9",
                        "surface-bright": "#f3fcef",
                        "surface": "#f3fcef",
                        "on-surface": "#161d16",
                        "tertiary": "#9e4036",
                        "on-secondary": "#ffffff",
                        "on-surface-variant": "#3d4a3d",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#e2ebde",
                        "primary-container": "#22c55e",
                        "primary": "#006e2f",
                        "outline-variant": "#bccbb9",
                        "secondary-fixed-dim": "#62df7d",
                        "on-secondary-fixed-variant": "#005320",
                        "on-tertiary-fixed": "#410001",
                        "background": "#f3fcef",
                        "surface-container-low": "#edf6ea",
                        "primary-fixed-dim": "#4ae176",
                        "on-primary-container": "#004b1e",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "inverse-primary": "#4ae176",
                        "tertiary-fixed": "#ffdad5",
                        "primary-fixed": "#6bff8f",
                        "surface-container": "#e8f0e4",
                        "tertiary-container": "#ff8b7c",
                        "surface-dim": "#d4ddd0",
                        "secondary-fixed": "#7ffc97",
                        "surface-container-highest": "#dce5d9",
                        "on-tertiary-fixed-variant": "#7f2a21"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "sm": "8px",
                        "base": "8px",
                        "xs": "4px",
                        "md": "16px",
                        "margin-mobile": "20px",
                        "lg": "24px",
                        "gutter-mobile": "12px"
                    },
                    "fontFamily": {
                        "label-md": ["Manrope"],
                        "h2": ["Manrope"],
                        "h1": ["Manrope"],
                        "caption": ["Manrope"],
                        "display": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "body-md": ["Manrope"]
                    },
                    "fontSize": {
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "caption": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "display": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface-container-lowest text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar Section - Shared Component mapping -->
<header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 transition-all duration-200 active:scale-95 fixed top-0 w-full z-50">
<div class="flex flex-row-reverse items-center justify-between w-full px-5 py-4">
<div class="flex items-center">
<span class="material-symbols-outlined text-green-500 dark:text-green-400" data-icon="arrow_forward">arrow_forward</span>
</div>
<h1 class="font-manrope text-lg font-bold text-on-surface">إنسان حساب</h1>
<div class="w-6"></div> <!-- Spacer for balance -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-24 pb-12">
<div class="w-full max-w-md bg-white p-lg rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-gray-100">
<!-- Hero Illustration/Branding -->
<div class="mb-8 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-container/10 mb-4">
<span class="material-symbols-outlined text-primary-container text-display" data-icon="person_add">person_add</span>
</div>
<h2 class="font-h1 text-h1 text-on-surface mb-2">ابدأ رحلتك معنا</h2>
<p class="font-body-md text-body-md text-on-surface-variant">قم بإنشاء حسابك للوصول إلى كافة المميزات.</p>
</div>
<!-- Registration Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block">البريد الإلكتروني</label>
<div class="relative group">
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary-container transition-colors" data-icon="mail">mail</span>
<input class="w-full pr-11 py-3 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-container/20 focus:border-primary-container transition-all outline-none font-body-md text-body-md" placeholder="example@domain.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block">كلمة المرور</label>
<div class="relative group">
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary-container transition-colors" data-icon="lock">lock</span>
<input class="w-full pr-11 py-3 bg-white border border-error rounded-lg focus:ring-2 focus:ring-error/20 focus:border-error transition-all outline-none font-body-md text-body-md" placeholder="••••••••" required="" type="password"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline cursor-pointer" data-icon="visibility">visibility</span>
</div>
<!-- Error Message - Defined in Requirements -->
<div class="flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[16px] text-[#EF4444]" data-icon="error">error</span>
<p class="font-caption text-caption text-[#EF4444]">كلمة المرور يجب أن تكون قوية</p>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block">تأكيد كلمة المرور</label>
<div class="relative group">
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary-container transition-colors" data-icon="lock_reset">lock_reset</span>
<input class="w-full pr-11 py-3 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary-container/20 focus:border-primary-container transition-all outline-none font-body-md text-body-md" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-[#22C55E] text-white font-label-md text-body-lg py-4 rounded-lg shadow-sm hover:brightness-105 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                    إنشاء الحساب
                    <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-8 pt-6 border-t border-gray-100 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    عندك حساب؟ 
                    <a class="text-primary-container font-bold hover:underline mr-1 transition-all" href="#">سجّل دخول</a>
</p>
</div>
<!-- Social Registration Alternative (Bento Style Suggestion) -->
</div>
<!-- Background Aesthetic Element -->
<div class="fixed top-0 right-0 -z-10 w-1/2 h-1/2 bg-gradient-to-bl from-primary-container/10 to-transparent blur-3xl opacity-50"></div>
<div class="fixed bottom-0 left-0 -z-10 w-1/2 h-1/2 bg-gradient-to-tr from-secondary-container/10 to-transparent blur-3xl opacity-50"></div>
</main>
<!-- Navigation Shell Suppressed as per Destination Rule for Transactional pages -->
</body></html>
