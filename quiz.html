<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/quiz.css">
    <script src="js/quiz.js"></script>
</head>
<body class="bg-background text-on-surface font-body-md antialiased pb-lg">
<!-- Top Navigation Bar -->
<header class="bg-white dark:bg-gray-950 border-b border-gray-200 dark:border-gray-800 shadow-sm flex flex-row-reverse items-center justify-between px-4 h-16 w-full z-50 sticky top-0">
<!-- Profile avatar removed as per request -->
<div class="flex items-center gap-2"></div>
</header>
<main class="max-w-md mx-auto px-margin py-xl min-h-[calc(100vh-64px)]">
    <!-- Quiz Screen -->
    <div id="quiz-screen">
        <!-- Progress Indicator -->
        <div class="mb-xl">
        <div class="flex justify-between items-center mb-sm">
        <span id="question-count" class="font-label-md text-label-md text-primary">السؤال 1 من 5</span>
        <span id="progress-text" class="font-label-md text-label-md text-outline">20% مكتمل</span>
        </div>
        <div class="h-1.5 w-full bg-gray-200 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-primary-container transition-all duration-500 ease-out" style="width: 20%;"></div>
        </div>
        </div>

        <!-- Question Card -->
        <div class="bg-white border border-gray-200 rounded-xl p-md shadow-sm mb-lg">
        <h2 id="question-text" class="font-display text-2xl font-bold text-on-surface mb-lg leading-tight"></h2>
        <div id="options-container" class="space-y-md">
            <!-- Options will be injected here -->
        </div>
        </div>

        <!-- Hint / Feedback Box -->
        <div id="feedback-box" class="hidden border rounded-xl p-md flex gap-md items-start mb-lg">
        <span id="feedback-icon" class="material-symbols-outlined"></span>
        <p id="feedback-text" class="font-body-sm text-body-sm"></p>
        </div>

        <!-- Action Buttons -->
        <div class="mt-xl space-y-md">
        <button id="action-btn" class="w-full bg-primary-container text-on-primary py-md px-lg rounded-xl font-button text-button shadow-md hover:bg-green-600 active:bg-green-700 active:scale-[0.97] active:shadow-sm transition-all duration-200">
            تحقق من الإجابة
        </button>
        </div>
    </div>

    <!-- Final Result Screen -->
    <div id="result-screen" class="hidden text-center bg-white border border-gray-200 rounded-xl p-xl shadow-sm mt-10">
        <span class="material-symbols-outlined text-6xl text-primary-container mb-4" data-icon="emoji_events">emoji_events</span>
        <h2 class="font-display text-3xl font-bold text-on-surface mb-2">اكتمل التحدي!</h2>
        <p class="font-body-lg text-on-surface-variant mb-6">نتيجتك هي: <span id="final-score" class="font-bold text-primary"></span></p>
        
        <div class="space-y-md">
            <button id="retry-btn" class="w-full bg-primary-container text-on-primary py-md px-lg rounded-xl font-button text-button shadow-md hover:bg-green-600 transition-all duration-200">
                إعادة المحاولة
            </button>
        </div>
    </div>

    <!-- Home button (Shared) -->
    <div class="mt-xl space-y-md">
        <button onclick="window.location.href='index.html'" class="w-full flex items-center justify-center gap-2 text-primary hover:bg-primary/5 py-3 rounded-xl transition-colors font-button text-button">
        <span class="material-symbols-outlined text-[20px]" data-icon="home">home</span>
        العودة للرئيسية
        </button>
    </div>
</main>
</body></html>
